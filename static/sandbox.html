<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, iframe { width: 100%; height: 100%; border: 0; }
    body { overflow: hidden; }
    #site-frame { display: block; }
    pre { padding: 1em; font-family: monospace; white-space: pre-wrap; color: #e0e0e0; background: #1a1a2e; min-height: 100vh; }
  </style>
</head>
<body>
  <iframe id="site-frame" style="display:none"></iframe>
  <pre id="listing" style="display:none"></pre>
  <script src="sandbox/sandbox.js" type="module"></script>
</body>
</html>
